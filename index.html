<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SECTOR RUSH — neon arcade racer · Coming Soon</title>
<meta name="description" content="Sector Rush — an OutRun-style neon arcade racer. Drift, boost, and outrun the clock through a neon world. Coming soon — wishlist on Steam.">
<!-- Open Graph / social sharing -->
<meta property="og:title" content="SECTOR RUSH — neon arcade racer">
<meta property="og:description" content="An OutRun-style neon arcade racer. Drift, boost, and outrun the clock through a neon world. Coming soon.">
<meta property="og:type" content="website">
<meta property="og:image" content="img/zone4.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700&family=Rajdhani:wght@500;600;700&family=Unica+One&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<main class="wrap">
  <img class="logo" src="img/logo.png" alt="SECTOR RUSH">
  <p class="status"><span class="dot"></span>Coming Soon</p>

  <!-- TRAILER — front and centre -->
  <div class="trailer">
    <video controls autoplay muted loop playsinline preload="metadata" poster="img/zone4.png">
      <source src="video/trailer.mp4" type="video/mp4">
      Your browser doesn’t support embedded video.
    </video>
  </div>

  <p class="tag">Drift, boost, and outrun the clock through a neon world.</p>

  <!-- WISHLIST -->
  <div class="cta">
    <!-- Replace data-url with your Steam store page once it exists, e.g.
         https://store.steampowered.com/app/XXXXXXX/Sector_Rush/ -->
    <a id="steam" class="btn btn--steam" href="STEAM_APP_URL" data-url="STEAM_APP_URL" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true" class="btn__icon">
        <path fill="currentColor" d="M12 2a10 10 0 0 0-9.96 9.2l5.34 2.2a2.83 2.83 0 0 1 1.6-.5h.14l2.37-3.44v-.05a3.78 3.78 0 1 1 3.78 3.78h-.09l-3.38 2.41v.12a2.84 2.84 0 0 1-5.62.55l-3.82-1.58A10 10 0 1 0 12 2Zm-3.2 15.18.97.4a2.13 2.13 0 1 0 .82-2.02l1.27.53a1.57 1.57 0 1 1-3.06 1.07Zm9.2-7.4a2.52 2.52 0 1 0-2.52-2.52A2.52 2.52 0 0 0 18 9.78Zm0-4.41a1.9 1.9 0 1 1-1.9 1.89A1.9 1.9 0 0 1 18 5.37Z"/>
      </svg>
      Wishlist on Steam
    </a>
    <p class="cta__msg" id="steamMsg"></p>

    <a class="btn btn--discord" href="https://discord.gg/EZWNjDGrFB" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true" class="btn__icon">
        <path fill="currentColor" d="M20.32 4.57A19.79 19.79 0 0 0 15.45 3c-.24.42-.5.99-.69 1.44a18.3 18.3 0 0 0-5.52 0C9.05 3.99 8.78 3.42 8.54 3a19.7 19.7 0 0 0-4.88 1.57C.53 9.26-.32 13.82.1 18.32a19.9 19.9 0 0 0 6 3.03c.48-.66.91-1.36 1.28-2.1-.7-.26-1.37-.59-2-.97.17-.12.33-.25.49-.38a14.2 14.2 0 0 0 12.26 0c.16.14.32.26.49.38-.63.38-1.3.7-2 .97.37.74.8 1.44 1.28 2.1a19.86 19.86 0 0 0 6-3.03c.5-5.21-.84-9.73-3.58-13.75ZM8.02 15.55c-1.18 0-2.15-1.09-2.15-2.42 0-1.34.95-2.43 2.15-2.43s2.17 1.1 2.15 2.43c0 1.33-.95 2.42-2.15 2.42Zm7.96 0c-1.18 0-2.15-1.09-2.15-2.42 0-1.34.95-2.43 2.15-2.43s2.17 1.1 2.15 2.43c0 1.33-.94 2.42-2.15 2.42Z"/>
      </svg>
      Join the Discord
    </a>
  </div>

  <!-- MAILING LIST -->
  <form class="signup" id="signup" data-endpoint="https://formspree.io/f/mrewdapg">
    <label class="signup__label" for="email">Get an email when it launches</label>
    <div class="signup__row">
      <input id="email" name="email" type="email" inputmode="email" autocomplete="email"
             placeholder="you@example.com" required>
      <button type="submit">Notify Me</button>
    </div>
    <!-- Formspree honeypot: bots fill this hidden field; real users never see it -->
    <input type="text" name="_gotcha" tabindex="-1" autocomplete="off" aria-hidden="true"
           style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0">

    <p class="signup__msg" id="signupMsg" role="status" aria-live="polite"></p>
  </form>
</main>

<footer class="footer">
  <p class="footer__logo">SECTOR <span>RUSH</span></p>
  <p>An OutRun-style neon arcade racer · Built in Godot</p>
  <p class="footer__small">Trailer footage is work-in-progress. © <span id="year"></span></p>
</footer>

<script src="script.js"></script>
</body>
</html>
